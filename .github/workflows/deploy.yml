name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/clothing-erp
            git pull origin main
            docker stop erp-spring-app || true
            docker rm erp-spring-app || true
            docker build -t clothing-erp .
            docker run -d --name erp-spring-app --network erp-network -p 8080:8080 clothing-erp:latest
