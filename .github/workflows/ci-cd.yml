name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          rsync -av --delete --exclude '.git' ./ /home/ec2-user/clothing-erp/
          cd /home/ec2-user/clothing-erp
          docker-compose down
          docker-compose up -d --build
          docker ps
