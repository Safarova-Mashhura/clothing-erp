name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Copy latest code to project folder
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude 'actions-runner' \
            ./ /home/ec2-user/clothing-erp/

      - name: Build Docker image
        run: |
          cd /home/ec2-user/clothing-erp
          sudo docker build -t clothing-erp .

      - name: Restart Spring Boot container
        run: |
          sudo docker stop erp-spring-app || true
          sudo docker rm erp-spring-app || true
          sudo docker run -d --name erp-spring-app --network erp-network -p 8080:8080 clothing-erp:latest

      - name: Check running containers
        run: |
          sudo docker ps