<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="html-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Zara Home Collection'">Zara Home Collection</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            500: '#0b69ff',
                            600: '#0052cc',
                            700: '#003e99',
                            800: '#002e73',
                            900: '#0a1d37',
                        },
                        neutral: {
                            850: '#1f293d',
                            950: '#0f172a',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Core Stylesheet -->
    <style>
        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        /* Custom dynamic glow effects */
        .glow-card {
            box-shadow: 0 4px 20px -2px rgba(11, 105, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-card:hover {
            box-shadow: 0 10px 30px -5px rgba(11, 105, 255, 0.12);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Sidebar Fragment -->
    <aside th:fragment="sidebar(activePage)" class="fixed inset-y-0 left-0 z-20 flex flex-col w-64 bg-brand-900 text-white transition-transform duration-300 transform md:translate-x-0 -translate-x-full" id="sidebar">
        <!-- Logo Branding -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-slate-800">
            <a href="/dashboard" class="flex items-center space-x-3">
                <div class="flex items-center justify-center w-9 h-9 rounded-lg bg-brand-500 shadow-lg shadow-brand-500/30">
                    <i class="fa-solid fa-layer-group text-lg text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-wide bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">Zara Home Collection ERP</span>
            </a>
            <button class="md:hidden text-slate-400 hover:text-white" onclick="toggleSidebar()">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- User Information Banner -->
        <div class="px-6 py-4 bg-brand-950/40 border-b border-slate-800/60">
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center border-2 border-brand-500/50">
                        <i class="fa-solid fa-user-tie text-slate-300"></i>
                    </div>
                    <span class="absolute bottom-0 right-0 block h-2.5 w-2.5 rounded-full bg-emerald-500 ring-2 ring-brand-900"></span>
                </div>
                <div>
                    <h4 class="text-sm font-semibold text-slate-200" sec:authentication="name">Username</h4>
                    <div class="flex items-center space-x-1.5 mt-0.5">
                        <span class="inline-block w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider" sec:authorize="hasRole('ADMIN')">Admin</span>
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider" sec:authorize="hasRole('MANAGER')">Manager</span>
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-wider" sec:authorize="hasRole('EMPLOYEE')">Employee</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar Navigation Menu -->
        <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto sidebar-scroll">
            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Main</p>
            
            <a href="/dashboard" th:class="${activePage == 'dashboard' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-chart-pie w-5 mr-3 text-base"></i>
                Dashboard
            </a>

            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider pt-4 mb-2">Core Modules</p>

            <a href="/crm" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" th:class="${activePage == 'crm' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-users-rectangle w-5 mr-3 text-base"></i>
                CRM Moduli
            </a>

            <a href="/wms" th:class="${activePage == 'wms' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-warehouse w-5 mr-3 text-base"></i>
                WMS Moduli
            </a>

            <a href="/erp" sec:authorize="hasAnyRole('ADMIN', 'MANAGER')" th:class="${activePage == 'erp' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-hand-holding-dollar w-5 mr-3 text-base"></i>
                ERP Moduli
            </a>

            <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider pt-4 mb-2">Operations</p>

            <a href="/cloud-architecture" th:class="${activePage == 'cloud' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-cloud-arrow-up w-5 mr-3 text-base text-sky-400"></i>
                AWS Cloud Arxitektura
            </a>

            <a href="/admin" sec:authorize="hasRole('ADMIN')" th:class="${activePage == 'admin' ? 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg bg-brand-500 text-white shadow-md shadow-brand-500/10' : 'flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200'}">
                <i class="fa-solid fa-sliders w-5 mr-3 text-base"></i>
                Admin Panel
            </a>

            <a href="/swagger-ui.html" target="_blank" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-white transition-all duration-200">
                <i class="fa-solid fa-book-open w-5 mr-3 text-base text-emerald-400"></i>
                Swagger API Docs
            </a>
        </nav>

        <!-- Sidebar Footer Action -->
        <div class="p-4 border-t border-slate-800 flex items-center justify-between">
            <span class="text-xs text-slate-500 font-medium">v1.0.0-PRO</span>
            <a href="/logout" class="text-xs font-semibold text-rose-400 hover:text-rose-300 flex items-center space-x-1">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Tizimdan chiqish</span>
            </a>
        </div>
    </aside>

    <!-- Top Navigation Navbar Fragment -->
    <header th:fragment="navbar" class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-10">
        <!-- Sidebar Toggle & Search Bar -->
        <div class="flex items-center space-x-4">
            <button class="md:hidden text-slate-600 hover:text-brand-500 focus:outline-none" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            
            <div class="hidden sm:flex items-center bg-slate-100 rounded-lg px-3 py-1.5 w-64 border border-slate-200">
                <i class="fa-solid fa-magnifying-glass text-slate-400 mr-2 text-sm"></i>
                <input type="text" placeholder="Qidirish (SKU, Buyurtma, Mijoz)..." class="bg-transparent border-none outline-none text-sm w-full text-slate-600">
            </div>
        </div>

        <!-- Top Right Actions -->
        <div class="flex items-center space-x-6">
            <!-- AWS Cloud Health Status badge -->
            <div class="hidden lg:flex items-center px-3 py-1 rounded-full bg-slate-100 border border-slate-200 text-xs font-semibold text-slate-600">
                <span class="h-2 w-2 rounded-full bg-emerald-500 mr-2 animate-ping"></span>
                <span>AWS Cloud: us-east-1 Active</span>
            </div>

            <!-- Notifications Dropdown -->
            <div class="relative cursor-pointer">
                <div class="relative p-1 text-slate-600 hover:text-brand-500">
                    <i class="fa-regular fa-bell text-lg"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-brand-500 ring-2 ring-white"></span>
                </div>
            </div>

            <!-- User Quick Access Profile -->
            <div class="flex items-center space-x-2 border-l border-slate-200 pl-4">
                <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold text-xs uppercase shadow-md shadow-brand-500/20" sec:authentication="name">
                    U
                </div>
                <span class="text-sm font-medium text-slate-700 hidden md:block" sec:authentication="name">User</span>
            </div>
        </div>
    </header>

    <th:block th:fragment="layout-js">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script>
            function toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.toggle('-translate-x-full');
            }
        </script>
    </th:block>
    <!--    </script>-->
    <!-- Side Menu Toggle JS -->
    <!--    <script th:fragment="layout-js">-->
    <!--        function toggleSidebar() {-->
    <!--            const sidebar = document.getElementById('sidebar');-->
    <!--            sidebar.classList.toggle('-translate-x-full');-->
    <!--        }-->

</body>
</html>
